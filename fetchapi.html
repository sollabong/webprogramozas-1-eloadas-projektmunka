<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Fetch API CRUD</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="js-crud/javascript.css"> </head>
<body>
    <div id="fetch-app" class="container">
        <h2>Tudósok kezelése (Fetch API + PHP)</h2>
        
        <div class="crud-form">
            <input type="text" id="f-nev" placeholder="Név">
            <input type="text" id="f-terulet" placeholder="Tudományterület">
            <button id="f-save-btn" onclick="saveTudos()">Hozzáadás</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Név</th>
                        <th>Terület</th>
                        <th>Műveletek</th>
                    </tr>
                </thead>
                <tbody id="f-tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'server/api.php';
        let editId = null;

        async function loadTudosok() {
            const resp = await fetch(API_URL);
            const data = await resp.json();
            const tbody = document.getElementById('f-tbody');
            tbody.innerHTML = data.map(t => `
                <tr>
                    <td>${t.nev}</td>
                    <td>${t.terulet}</td>
                    <td>
                        <button class="btn-edit" onclick="setupEdit(${t.id}, '${t.nev}', '${t.terulet}')">Szerkesztés</button>
                        <button class="btn-delete" onclick="deleteTudos(${t.id})">Törlés</button>
                    </td>
                </tr>
            `).join('');
        }

        async function saveTudos() {
            const nev = document.getElementById('f-nev').value;
            const terulet = document.getElementById('f-terulet').value;
            const method = editId ? 'PUT' : 'POST';
            const body = { nev, terulet };
            if(editId) body.id = editId;

            await fetch(API_URL, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            editId = null;
            document.getElementById('f-nev').value = '';
            document.getElementById('f-terulet').value = '';
            document.getElementById('f-save-btn').innerText = 'Hozzáadás';
            loadTudosok();
        }

        async function deleteTudos(id) {
            if(!confirm("Biztos törlöd?")) return;
            await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
            loadTudosok();
        }

        function setupEdit(id, nev, terulet) {
            editId = id;
            document.getElementById('f-nev').value = nev;
            document.getElementById('f-terulet').value = terulet;
            document.getElementById('f-save-btn').innerText = 'Mentés';
        }

        loadTudosok();
    </script>
</body>
</html>
