<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>OOJS Grafikus App</title>
    <link rel="stylesheet" href="../style/style.css">
    <style>
        canvas { background: white; border: 1px solid var(--border); border-radius: var(--radius); cursor: crosshair; }
    </style>
</head>
<body>
    <div class="container">
        <h2>OOJS: Interaktív Tudomány-Részecskék</h2>
        <p>Kattints a vászonra új részecskék létrehozásához!</p>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        // Alaposztály (Szülő)
        class BaseParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 20 + 10;
                this.color = '#2fdab4'; 
            }

            // Alap metódus, amit a leszármazott is használhat
            drawBase(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Leszármazott osztály (Gyerek)
        class Particle extends BaseParticle {
            constructor(x, y) {
                super(x, y); // Szülő konstruktor hívása
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.1;
            }

            draw(ctx) {
                this.drawBase(ctx); // Szülő metódusának használata
            }
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 400;
        let particles = [];

        canvas.addEventListener('click', (e) => {
            for(let i=0; i<10; i++) {
                const p = new Particle(e.offsetX, e.offsetY);
                particles.push(p);
            }
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update();
                p.draw(ctx);
                if(p.size <= 0.2) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
